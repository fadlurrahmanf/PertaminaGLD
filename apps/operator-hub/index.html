<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pertamina GLD — Operator Hub</title>
  <link rel="stylesheet" href="./css/tokens.css?v=1" />
  <link rel="stylesheet" href="./css/hub.css?v=1" />
</head>
<body>
  <div class="shell">
    <header class="strip">
      <div class="brand">
        <span class="eyebrow">Pertamina GLD</span>
        <h1>Operator Hub</h1>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab" data-app="gld" type="button">
          <span class="dot" data-dot="gld"></span> GLD
        </button>
        <button class="tab" data-app="ch" type="button">
          <span class="dot" data-dot="ch"></span> CH
        </button>
        <button class="tab" data-app="gw" type="button">
          <span class="dot" data-dot="gw"></span> Gateway
        </button>
      </nav>
    </header>
    <main class="stage">
      <div class="stage-banner" id="stageBanner" hidden></div>
      <iframe id="appFrame" class="app-frame" title="Operator app"></iframe>
    </main>
  </div>
  <script type="module" src="./js/hub.js"></script>
</body>
</html>
