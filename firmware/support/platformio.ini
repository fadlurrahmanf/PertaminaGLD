[platformio]
description = Pertamina GLD support/debug firmware workspace
src_dir = ..

; Legacy per-mode GLD environments are kept here so the main firmware
; workspace exposes only the three final deploy targets.
; Build from the repo root with:
;   pio run -d firmware/support -e <env_name>

[env:gld_inference_esp32s3]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
lib_extra_dirs = ../lib
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I../config
    -I../shared/include
    -I../gld/include
    -I../gld/model
build_src_filter =
    +<shared/src/AppFrame.cpp>
    +<shared/src/GldCrypto.cpp>
    +<shared/src/GldPayload.cpp>
    +<shared/src/GldRecord.cpp>
    +<gld/src/GldAds1256Reader.cpp>
    +<gld/src/GldFrameBuilder.cpp>
    +<gld/src/GldMovingAverage.cpp>
    +<gld/src/GldPower.cpp>
    +<gld/src/GldThresholdClassifier.cpp>
    +<gld/src/GldInferenceMain.cpp>
    +<gld/model/NeuralNetwork.cpp>
    +<gld/model/scaler_params.cpp>
    +<gld/model/model_data.cpp>
    -<gld/src/main.cpp>
    -<gld/src/GldSensorSelfTestMain.cpp>
    -<gld/src/GldNullingSelfTestMain.cpp>
    -<gld/src/GldLoRaTxSelfTestMain.cpp>
    -<ch/src/>
    -<docs/>
    -<tests/>
    -<versions/>

