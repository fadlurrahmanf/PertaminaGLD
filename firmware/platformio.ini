[platformio]
description = Pertamina GLD firmware workspace
src_dir = .

; Host-level protocol tests currently run with:
;   python firmware/tests/run_tests.py
;
; Final firmware environments live here.
; Legacy GLD support/debug environments live in:
;   firmware/support/platformio.ini
; Bench-only self-test environments live in:
;   firmware/bench/platformio.ini

[env:gld_unified_esp32s3]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Iconfig
    -Ishared/include
    -Igld/include
    -Igld/model
build_src_filter =
    +<shared/src/AppFrame.cpp>
    +<shared/src/GldCrypto.cpp>
    +<shared/src/GldPayload.cpp>
    +<shared/src/GldRecord.cpp>
    +<gld/src/GldAds1256Reader.cpp>
    +<gld/src/GldCommandParser.cpp>
    +<gld/src/GldDacMux.cpp>
    +<gld/src/GldFrameBuilder.cpp>
    +<gld/src/GldModeManager.cpp>
    +<gld/src/GldMovingAverage.cpp>
    +<gld/src/GldNullingService.cpp>
    +<gld/src/GldPower.cpp>
    +<gld/src/GldThresholdClassifier.cpp>
    +<gld/src/GldUnifiedMain.cpp>
    +<gld/model/NeuralNetwork.cpp>
    +<gld/model/scaler_params.cpp>
    +<gld/model/model_data.cpp>
    -<gld/src/main.cpp>
    -<gld/src/GldSensorSelfTestMain.cpp>
    -<gld/src/GldNullingSelfTestMain.cpp>
    -<gld/src/GldLoRaTxSelfTestMain.cpp>
    -<gld/src/GldInferenceMain.cpp>
    -<gld/src/GldDatasetMain.cpp>
    -<gld/src/GldNullingRuntimeMain.cpp>
    -<ch/src/>
    -<docs/>
    -<tests/>
    -<versions/>

[env:gld_unified_to_ch2_1_esp32s3]
extends = env:gld_unified_esp32s3
build_flags =
    ${env:gld_unified_esp32s3.build_flags}
    -DGLD_CH_ID=0x0066

[env:gld_unified_wroom_u1_n16r8_esp32s3]
extends = env:gld_unified_esp32s3
board = esp32-s3-devkitc-1
upload_speed = 115200
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
build_flags =
    ${env:gld_unified_esp32s3.build_flags}
    -DBOARD_HAS_PSRAM
    -DPGL_GLD_BOARD_PROFILE_WROOM_U1_N16R8=1

[env:ch_star_mesh_runtime_esp32s3]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Iconfig
    -Ishared/include
    -Ich/include
build_src_filter =
    +<shared/src/AppFrame.cpp>
    +<shared/src/FirmwareConfig.cpp>
    +<shared/src/GldRecord.cpp>
    +<ch/src/AlarmQueue.cpp>
    +<ch/src/ChPullRequest.cpp>
    +<ch/src/ChRuntime.cpp>
    +<ch/src/ChTxQueue.cpp>
    +<ch/src/ChUplink.cpp>
    +<ch/src/ClusterResponse.cpp>
    +<ch/src/NodeCache.cpp>
    +<ch/src/ChStarMeshRuntimeMain.cpp>
    -<gld/src/>
    -<ch/src/ChStarRxSelfTestMain.cpp>
    -<docs/>
    -<tests/>
    -<versions/>

[env:ch_layer1_1_esp32s3]
extends = env:ch_star_mesh_runtime_esp32s3
build_flags =
    ${env:ch_star_mesh_runtime_esp32s3.build_flags}
