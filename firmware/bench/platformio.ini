[platformio]
description = Pertamina GLD bench and self-test firmware workspace
src_dir = ..

; Bench-only environments are kept separate from the daily runtime/support list
; in ../platformio.ini. Build from the repo root with:
;   pio run -d firmware/bench -e <env_name>

[env:gld_selftest_esp32s3]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
build_flags =
    -I../shared/include
    -I../gld/include
    -I../ch/include
build_src_filter =
    +<shared/src/>
    +<gld/src/>
    +<ch/src/>
    -<gld/src/GldAds1256Reader.cpp>
    -<gld/src/GldMovingAverage.cpp>
    -<gld/src/GldPower.cpp>
    -<gld/src/GldSensorSelfTestMain.cpp>
    -<docs/>
    -<tests/>
    -<versions/>

[env:gld_sensor_selftest_esp32s3]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I../shared/include
    -I../gld/include
build_src_filter =
    +<gld/src/GldAds1256Reader.cpp>
    +<gld/src/GldMovingAverage.cpp>
    +<gld/src/GldPower.cpp>
    +<gld/src/GldSensorSelfTestMain.cpp>
    -<gld/src/main.cpp>
    -<shared/src/>
    -<ch/src/>
    -<docs/>
    -<tests/>
    -<versions/>

