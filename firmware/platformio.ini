[platformio]
description = Pertamina GLD firmware workspace
src_dir = .

; Host-level protocol tests currently run with:
;   python firmware/tests/run_tests.py
;
; Final firmware environments live here.
; Legacy GLD support/debug environments live in:
;   firmware/support/platformio.ini
; Bench-only self-test environments live in:
;   firmware/bench/platformio.ini

[env:gld]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
extra_scripts = post:tools/operator_package_post.py
upload_speed = 921600
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
lib_ldf_mode = deep+
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DPGL_GLD_BOARD_PROFILE_WROOM_U1_N16R8=1
    -Iconfig
    -Ishared/include
    -Igld/include
    -Igld/model
build_src_filter =
    +<shared/src/AppFrame.cpp>
    +<shared/src/GldCrypto.cpp>
    +<shared/src/GldPayload.cpp>
    +<shared/src/GldRecord.cpp>
    +<gld/src/GldAds1256Reader.cpp>
    +<gld/src/GldCommandParser.cpp>
    +<gld/src/GldDacMux.cpp>
    +<gld/src/GldFrameBuilder.cpp>
    +<gld/src/GldModeManager.cpp>
    +<gld/src/GldMovingAverage.cpp>
    +<gld/src/GldNullingService.cpp>
    +<gld/src/GldPower.cpp>
    +<gld/src/GldQcService.cpp>
    +<gld/src/GldThresholdClassifier.cpp>
    +<gld/src/GldUnifiedMain.cpp>
    +<gld/model/NeuralNetwork.cpp>
    +<gld/model/scaler_params.cpp>
    +<gld/model/model_data.cpp>
    -<gld/src/main.cpp>
    -<gld/src/GldSensorSelfTestMain.cpp>
    -<gld/src/GldNullingSelfTestMain.cpp>
    -<gld/src/GldLoRaTxSelfTestMain.cpp>
    -<gld/src/GldInferenceMain.cpp>
    -<gld/src/GldDatasetMain.cpp>
    -<gld/src/GldNullingRuntimeMain.cpp>
    -<ch/src/>
    -<docs/>
    -<tests/>
    -<versions/>

[env:tfbg]
; Field battery test: retain battery framing/power identity, but run the
; continuous 24V scan/TX cadence without the one-shot TPL5010 power-off flow.
extends = env:gld
build_flags =
    ${env:gld.build_flags}
    -DPGL_GLD_TFBG_CONTINUOUS_BATTERY=1

; Isolated field test for the legacy 8-input/4-output placeholder model. This
; environment keeps a battery-powered board awake with the continuous scan/TX
; cadence, rather than issuing the one-shot TPL5010 DONE -> CLR power-off.
; It is non-production: authenticated non-alarm telemetry may be sent, but
; alarm radio frames and physical alarm outputs are suppressed, and non-clear
; classes are reported as unverified.
[env:gldFieldtest]
extends = env:gld
build_flags =
    ${env:gld.build_flags}
    -DPGL_GLD_TFBG_CONTINUOUS_BATTERY=1
    -DPGL_GLD_FIELDTEST_4CLASS=1
    -DPGL_GLD_FIELDTEST_SELFTEST_BUILD=1
    -DGLD_ALLOW_SELFTEST_AES_FALLBACK=1

; TPL5010 power-cycle smoke test. Inherits the GLD board/toolchain settings
; but replaces the normal unified firmware entry point with the test main.
[env:gld_tpl5010_powercycle_test]
extends = env:gld
build_src_filter =
    ${env:gld.build_src_filter}
    -<gld/src/GldUnifiedMain.cpp>
    +<gld/src/GldTpl5010PowerCycleTestMain.cpp>

[env:ch]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
extra_scripts = post:tools/operator_package_post.py
lib_ldf_mode = deep+
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DPGL_CH_BOARD_CH3=1
    -DPGL_CH_USE_RF_SWITCH=1
    ; CH E22: TPL5010 WAKE is GPIO21; DONE is GPIO47. Keep the board powered
    ; during continuous operation by periodically pulsing the actual DONE net.
    -DPGL_CH_USE_EXTERNAL_WDT_KEEPALIVE=1
    -DPGL_CH_BOOT_SETTLE_MS=12000
    -DPGL_CH_USE_REFERENCE_RADIO_RESET=1
    -DPGL_CH_RADIO_INIT_RETRY_MS=7000
    -DPGL_CH_EXTERNAL_WDT_KEEPALIVE_INTERVAL_MS=10000
    ; Keep battery telemetry, but do not gate CH start, run, or recovery on it.
    -DPGL_CH_VBAT_READ_ONLY=1
    -Iconfig
    -Ishared/include
    -Ich/include
build_src_filter =
    +<shared/src/AppFrame.cpp>
    +<shared/src/FirmwareConfig.cpp>
    +<shared/src/GldRecord.cpp>
    +<ch/src/AlarmQueue.cpp>
    +<ch/src/ChCommandParser.cpp>
    +<ch/src/ChPullRequest.cpp>
    +<ch/src/ChRuntime.cpp>
    +<ch/src/ChTxQueue.cpp>
    +<ch/src/ChUplink.cpp>
    +<ch/src/ClusterResponse.cpp>
    +<ch/src/NodeCache.cpp>
    +<ch/src/ChStarMeshRuntimeMain.cpp>
    -<gld/src/>
    -<ch/src/ChStarRxSelfTestMain.cpp>
    -<docs/>
    -<tests/>
    -<versions/>

[env:chFieldtest]
extends = env:ch
build_flags =
    ${env:ch.build_flags}
    -DPGL_CH_FIELD_HELLO_INTERVAL_MS=30000
    -DPGL_CH_FIELD_HELLO_JITTER_MS=5000
    -DPGL_CH_FIELD_TEST_BUILD=1

[env:gw_hello_ack_fieldtest]
extends = env:gw

[env:gw]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
extra_scripts = post:tools/operator_package_post.py
lib_ldf_mode = deep+
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Iconfig
    -Ishared/include
    -Igateway/include
build_src_filter =
    +<shared/src/AppFrame.cpp>
    +<gateway/src/GatewayMqttMeshMain.cpp>
    -<gld/src/>
    -<ch/src/>
    -<docs/>
    -<tests/>
    -<versions/>
