<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pertamina GLD — Operator Hub</title>
  <link rel="stylesheet" href="./css/tokens.css?v=1" />
  <link rel="stylesheet" href="./css/hub.css?v=1" />
</head>
<body>
  <div class="shell">
    <header class="strip">
      <button class="brand brand-button" id="homeBtn" type="button" title="Back to operator selection">
        <span class="eyebrow">Pertamina GLD</span>
        <h1>Operator Hub</h1>
      </button>
      <nav class="tabs" id="tabs">
        <button class="tab" data-app="gld" type="button">
          <span class="dot" data-dot="gld"></span> GLD
        </button>
        <button class="tab" data-app="ch" type="button">
          <span class="dot" data-dot="ch"></span> CH
        </button>
        <button class="tab" data-app="gw" type="button">
          <span class="dot" data-dot="gw"></span> Gateway
        </button>
      </nav>
      <div class="readiness" id="readiness" title="Checking startup requirements">Setup: checking</div>
      <button class="refresh-btn" id="refreshReadinessBtn" type="button" title="Recheck firmware packages, runtimes, and ports">Refresh readiness</button>
    </header>
    <main class="stage">
      <div class="stage-banner" id="stageBanner" hidden></div>
      <section class="landing" id="landing" aria-labelledby="landingTitle">
        <div class="landing-copy">
          <span class="eyebrow">Select workspace</span>
          <h2 id="landingTitle">Choose an operator console</h2>
          <p>Choose the device group you want to operate. You can return here anytime by clicking Operator Hub.</p>
        </div>
        <div class="operator-grid">
          <button class="operator-card" data-launch-app="gld" type="button">
            <span class="operator-mark">GLD</span>
            <span class="operator-card-copy">
              <strong>Gas Leak Detector</strong>
              <small>Sensor, data, calibration, and GLD operations</small>
            </span>
          </button>
          <button class="operator-card" data-launch-app="ch" type="button">
            <span class="operator-mark">CH</span>
            <span class="operator-card-copy">
              <strong>Cluster Head</strong>
              <small>LoRa node, serial, routing, and firmware operations</small>
            </span>
          </button>
          <button class="operator-card" data-launch-app="gw" type="button">
            <span class="operator-mark">GW</span>
            <span class="operator-card-copy">
              <strong>Gateway</strong>
              <small>Wi-Fi, MQTT, topology, and gateway operations</small>
            </span>
          </button>
        </div>
      </section>
      <iframe id="appFrame" class="app-frame" title="Operator app" hidden></iframe>
    </main>
  </div>
  <script type="module" src="./js/hub.js"></script>
</body>
</html>
